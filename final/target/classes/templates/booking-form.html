<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dat phong moi')}"></head>
<body>
<div class="wrapper">
    <nav th:replace="~{fragments :: sidebar('bookings')}"></nav>

    <div class="main-content">
        <div class="content-header">
            <a th:href="@{/bookings}" class="btn btn-outline-secondary btn-sm mb-2">
                <i class="bi bi-arrow-left"></i> Quay lai
            </a>
            <h4><i class="bi bi-calendar-plus"></i> Dat phong moi</h4>
        </div>

        <div class="form-section">
            <form th:action="@{/bookings/save}" method="post" th:object="${booking}">

                <div class="row mb-3">
                    <div class="col-md-6">
                        <h6 class="text-primary mb-3"><i class="bi bi-person"></i> Thong tin khach hang</h6>

                        <div class="mb-3">
                            <label class="form-label">Ho va ten *</label>
                            <input type="text" class="form-control" th:field="*{guestName}" required
                                   placeholder="Nhap ho ten khach">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">So dien thoai *</label>
                            <input type="text" class="form-control" th:field="*{guestPhone}" required
                                   placeholder="Nhap so dien thoai">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">CCCD/Passport</label>
                            <input type="text" class="form-control" th:field="*{guestIdCard}"
                                   placeholder="Nhap so CCCD hoac passport">
                        </div>
                    </div>

                    <div class="col-md-6">
                        <h6 class="text-primary mb-3"><i class="bi bi-door-open"></i> Thong tin dat phong</h6>

                        <div class="mb-3">
                            <label class="form-label">Phong *</label>
                            <select class="form-select" th:field="*{roomId}" required id="roomSelect">
                                <option value="">-- Chon phong --</option>
                                <option th:each="room : ${availableRooms}"
                                        th:value="${room.id}"
                                        th:text="${room.roomNumber + ' - ' + room.category + ' (' + #numbers.formatDecimal(room.pricePerNight, 0, 'COMMA', 0, 'POINT') + ' VND/dem)'}"
                                        th:selected="${room.id == booking.roomId}">Room</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Loai dat phong</label>
                            <div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{bookingType}"
                                           value="NIGHTLY" id="typeNightly" onclick="toggleBookingType()">
                                    <label class="form-check-label" for="typeNightly">Theo dem</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" th:field="*{bookingType}"
                                           value="HOURLY" id="typeHourly" onclick="toggleBookingType()">
                                    <label class="form-check-label" for="typeHourly">Theo gio</label>
                                </div>
                            </div>
                        </div>

                        <div id="nightlyFields">
                            <div class="mb-3">
                                <label class="form-label">Check-in (mac dinh 14:00)</label>
                                <input type="datetime-local" class="form-control" th:field="*{checkIn}" id="checkIn">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Check-out (mac dinh 12:00)</label>
                                <input type="datetime-local" class="form-control" th:field="*{checkOut}" id="checkOut">
                            </div>
                        </div>

                        <div id="hourlyFields" style="display:none;">
                            <div class="mb-3">
                                <label class="form-label">Thoi gian bat dau</label>
                                <input type="datetime-local" class="form-control" id="hourlyCheckIn" name="hourlyCheckIn">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">So gio thue</label>
                                <input type="number" class="form-control" th:field="*{hoursBooked}"
                                       id="hoursBooked" min="1" max="24" value="1">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Ghi chu</label>
                    <textarea class="form-control" th:field="*{notes}" rows="2"
                              placeholder="Ghi chu them (khong bat buoc)"></textarea>
                </div>

                <div class="text-end">
                    <a th:href="@{/bookings}" class="btn btn-secondary me-2">Huy</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> Xac nhan dat phong
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
<script>
    function toggleBookingType() {
        var nightly = document.getElementById('typeNightly').checked;
        document.getElementById('nightlyFields').style.display = nightly ? 'block' : 'none';
        document.getElementById('hourlyFields').style.display = nightly ? 'none' : 'block';

        // Disable hidden fields so browser skips their validation
        document.getElementById('checkIn').disabled = !nightly;
        document.getElementById('checkOut').disabled = !nightly;
        document.getElementById('hourlyCheckIn').disabled = nightly;
        document.getElementById('hoursBooked').disabled = nightly;
    }

    document.addEventListener('DOMContentLoaded', function() {
        toggleBookingType();

        var form = document.querySelector('form');
        form.addEventListener('submit', function() {
            var nightly = document.getElementById('typeNightly').checked;
            if (!nightly) {
                // Re-enable checkIn so its value is submitted
                document.getElementById('checkIn').disabled = false;
                document.getElementById('checkIn').value = document.getElementById('hourlyCheckIn').value;
                document.getElementById('checkOut').disabled = false;
                document.getElementById('checkOut').value = '';
            }
            // Re-enable hoursBooked so its value is submitted
            document.getElementById('hoursBooked').disabled = false;
        });
    });
</script>
</body>
</html>
