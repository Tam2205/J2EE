<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Quan ly phong')}"></head>
<body>
<div class="wrapper">
    <nav th:replace="~{fragments :: sidebar('rooms')}"></nav>

    <div class="main-content">
        <div class="content-header d-flex justify-content-between align-items-center">
            <h4><i class="bi bi-door-open"></i> Quan ly phong</h4>
            <a th:href="@{/bookings/new}" class="btn btn-primary">
                <i class="bi bi-plus"></i> Dat phong moi
            </a>
        </div>

        <!-- Category Filter -->
        <div class="mb-3">
            <a th:href="@{/rooms}" class="btn btn-sm me-1"
               th:classappend="${selectedCategory == null ? 'btn-dark' : 'btn-outline-dark'}">Tat ca</a>
            <a th:each="cat : ${categories}"
               th:href="@{/rooms(category=${cat})}"
               th:text="${cat}"
               class="btn btn-sm me-1"
               th:classappend="${selectedCategory == cat ? 'btn-dark' : 'btn-outline-dark'}">CAT</a>
        </div>

        <!-- Room Table -->
        <div class="card-custom">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-custom table-hover">
                        <thead>
                        <tr>
                            <th>Phong</th>
                            <th>Hang</th>
                            <th>Tang</th>
                            <th>Gia/dem</th>
                            <th>Gia/gio</th>
                            <th>Trang thai</th>
                            <th>Khach</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="room : ${rooms}">
                            <td><strong th:text="${room.roomNumber}">P101</strong></td>
                            <td>
                                <span class="category-label" th:classappend="'category-' + ${room.category}"
                                      th:text="${room.category}">STANDARD</span>
                            </td>
                            <td th:text="${room.floor}">1</td>
                            <td th:text="${#numbers.formatDecimal(room.pricePerNight, 0, 'COMMA', 0, 'POINT')} + ' VND'">500,000 VND</td>
                            <td th:text="${#numbers.formatDecimal(room.pricePerHour, 0, 'COMMA', 0, 'POINT')} + ' VND'">100,000 VND</td>
                            <td>
                                <span class="badge"
                                      th:classappend="${room.status == 'AVAILABLE' ? 'bg-success' : (room.status == 'OCCUPIED' ? 'bg-danger' : 'bg-warning text-dark')}"
                                      th:text="${room.status == 'AVAILABLE' ? 'Trong' : (room.status == 'OCCUPIED' ? 'Dang thue' : 'Bao tri')}">Status</span>
                            </td>
                            <td th:text="${roomBookingMap.containsKey(room.id) ? roomBookingMap.get(room.id).guestName : '-'}">-</td>
                            <td th:text="${roomBookingMap.containsKey(room.id) ? #temporals.format(roomBookingMap.get(room.id).checkIn, 'dd/MM HH:mm') : '-'}">-</td>
                            <td th:text="${roomBookingMap.containsKey(room.id) ? #temporals.format(roomBookingMap.get(room.id).checkOut, 'dd/MM HH:mm') : '-'}">-</td>
                            <td>
                                <a th:href="@{/rooms/{id}(id=${room.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:if="${room.status == 'AVAILABLE'}"
                                   th:href="@{/bookings/new(roomId=${room.id})}" class="btn btn-sm btn-success">
                                    <i class="bi bi-plus"></i>
                                </a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
