<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments :: head('Nhat ky hoat dong')}"></head>
<body>
    <div class="d-flex">
        <div th:replace="~{fragments :: sidebar('activity-logs')}"></div>

        <main class="main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi bi-clock-history"></i> Nhat ky hoat dong</h2>
                <div>
                    <span class="text-muted" sec:authentication="name">User</span>
                    <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm ms-2">
                        <i class="bi bi-box-arrow-right"></i> Dang xuat
                    </a>
                </div>
            </div>

            <!-- Filter -->
            <div class="card mb-4">
                <div class="card-body">
                    <form class="row g-3 align-items-end" method="get" th:action="@{/activity-logs}">
                        <div class="col-md-4">
                            <label class="form-label">Loc theo nguoi dung</label>
                            <input type="text" name="username" class="form-control" placeholder="Nhap ten dang nhap..."
                                   th:value="${filterUsername}">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-search"></i> Loc</button>
                            <a th:href="@{/activity-logs}" class="btn btn-outline-secondary">Tat ca</a>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Logs Table -->
            <div class="card">
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>Thoi gian</th>
                                    <th>Nguoi dung</th>
                                    <th>Hanh dong</th>
                                    <th>Mo ta</th>
                                    <th>IP</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="log : ${logs}">
                                    <td th:text="${#temporals.format(log.timestamp, 'dd/MM/yyyy HH:mm:ss')}"></td>
                                    <td><span class="badge bg-info" th:text="${log.username}"></span></td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${log.action == 'LOGIN' ? 'bg-success' :
                                                               log.action == 'LOGOUT' ? 'bg-secondary' :
                                                               log.action == 'BOOKING' ? 'bg-primary' :
                                                               log.action == 'CHECKOUT' ? 'bg-warning text-dark' :
                                                               log.action == 'VEHICLE_RENT' ? 'bg-info' :
                                                               log.action == 'VEHICLE_RETURN' ? 'bg-dark' :
                                                               'bg-secondary'}"
                                              th:text="${log.action}"></span>
                                    </td>
                                    <td th:text="${log.description}"></td>
                                    <td><small class="text-muted" th:text="${log.ipAddress}"></small></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(logs)}">
                                    <td colspan="5" class="text-center text-muted py-4">Chua co nhat ky hoat dong nao</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
