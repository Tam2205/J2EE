<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Cho thue xe')}"></head>
<body>
<div class="wrapper">
    <nav th:replace="~{fragments :: sidebar('vehicles')}"></nav>

    <div class="main-content">
        <div class="content-header">
            <h4><i class="bi bi-car-front"></i> Quan ly cho thue xe</h4>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <!-- Vehicle List -->
            <div class="col-lg-7">
                <div class="card-custom mb-4">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="bi bi-list-ul"></i> Danh sach xe</span>
                        <button class="btn btn-sm btn-primary" data-bs-toggle="modal" data-bs-target="#addVehicleModal">
                            <i class="bi bi-plus"></i> Them xe
                        </button>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-custom table-hover">
                                <thead>
                                <tr>
                                    <th>Xe</th>
                                    <th>Loai</th>
                                    <th>Bien so</th>
                                    <th>Gia/ngay</th>
                                    <th>Gia/gio</th>
                                    <th>Trang thai</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="v : ${vehicles}">
                                    <td><strong th:text="${v.name}">Vehicle</strong></td>
                                    <td>
                                        <span class="badge bg-secondary" th:text="${v.type}">Type</span>
                                    </td>
                                    <td th:text="${v.licensePlate}">Plate</td>
                                    <td th:text="${#numbers.formatDecimal(v.pricePerDay, 0, 'COMMA', 0, 'POINT')}">0</td>
                                    <td th:text="${#numbers.formatDecimal(v.pricePerHour, 0, 'COMMA', 0, 'POINT')}">0</td>
                                    <td>
                                        <span class="badge"
                                              th:classappend="${v.status == 'AVAILABLE' ? 'bg-success' : (v.status == 'RENTED' ? 'bg-danger' : 'bg-warning text-dark')}"
                                              th:text="${v.status == 'AVAILABLE' ? 'San sang' : (v.status == 'RENTED' ? 'Dang thue' : 'Bao tri')}">Status</span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Rent Vehicle Form -->
                <div class="card-custom mb-4" th:if="${!#lists.isEmpty(activeBookings)}">
                    <div class="card-header">
                        <i class="bi bi-car-front"></i> Cho thue xe cho khach
                    </div>
                    <div class="card-body">
                        <form th:action="@{/vehicles/rent}" method="post">
                            <div class="row g-3">
                                <div class="col-md-4">
                                    <label class="form-label">Chon xe</label>
                                    <select name="vehicleId" class="form-select" required>
                                        <option value="">-- Chon xe --</option>
                                        <th:block th:each="v : ${vehicles}">
                                            <option th:if="${v.status == 'AVAILABLE'}"
                                                    th:value="${v.id}"
                                                    th:text="${v.name + ' (' + v.licensePlate + ')'}">Vehicle</option>
                                        </th:block>
                                    </select>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">Lien ket phong (khach)</label>
                                    <select name="bookingId" class="form-select" required>
                                        <option value="">-- Chon dat phong --</option>
                                        <option th:each="b : ${activeBookings}"
                                                th:value="${b.id}"
                                                th:text="${b.roomNumber + ' - ' + b.guestName}">Booking</option>
                                    </select>
                                </div>
                                <div class="col-md-2">
                                    <label class="form-label">Phi thue (VND)</label>
                                    <input type="number" name="totalAmount" class="form-control"
                                           required min="0" placeholder="0">
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="bi bi-check"></i> Cho thue
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Active Rentals -->
            <div class="col-lg-5">
                <div class="card-custom mb-4">
                    <div class="card-header">
                        <i class="bi bi-clock-history"></i> Xe dang cho thue
                        <span class="badge bg-danger ms-2" th:text="${#lists.size(activeRentals)}">0</span>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(activeRentals)}" class="text-muted text-center py-3">
                            Khong co xe nao dang cho thue
                        </div>
                        <div th:each="r : ${activeRentals}" class="vehicle-card rented mb-3">
                            <div class="d-flex justify-content-between align-items-start">
                                <div>
                                    <strong th:text="${r.vehicleName}">Vehicle</strong>
                                    <br>
                                    <small class="text-muted" th:text="'BS: ' + ${r.vehicleLicensePlate}">Plate</small>
                                    <br>
                                    <span class="badge bg-dark" th:text="'Phong ' + ${r.roomNumber}">Room</span>
                                    <small th:text="${r.guestName}">Guest</small>
                                    <br>
                                    <small class="text-muted"
                                           th:text="'Bat dau: ' + ${#temporals.format(r.startTime, 'dd/MM/yyyy HH:mm')}">Start</small>
                                    <br>
                                    <small class="fw-bold" th:text="${#numbers.formatDecimal(r.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VND'">0</small>
                                </div>
                                <form th:action="@{/vehicles/return/{id}(id=${r.id})}" method="post">
                                    <button type="submit" class="btn btn-sm btn-warning"
                                            onclick="return confirm('Xac nhan tra xe?')">
                                        <i class="bi bi-box-arrow-in-left"></i> Tra xe
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Add Vehicle Modal -->
<div class="modal fade" id="addVehicleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/vehicles/add}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">Them xe moi</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Ten xe</label>
                        <input type="text" name="name" class="form-control" required placeholder="VD: Honda SH 150i">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Loai xe</label>
                        <select name="type" class="form-select" required>
                            <option value="CAR">O to</option>
                            <option value="MOTORBIKE">Xe may</option>
                            <option value="ELECTRIC_SCOOTER">Xe dien</option>
                            <option value="BICYCLE">Xe dap</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Bien so</label>
                        <input type="text" name="licensePlate" class="form-control" placeholder="VD: 51A-123.45">
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label">Gia/ngay (VND)</label>
                            <input type="number" name="pricePerDay" class="form-control" min="0" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label">Gia/gio (VND)</label>
                            <input type="number" name="pricePerHour" class="form-control" min="0" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Mo ta</label>
                        <input type="text" name="description" class="form-control" placeholder="Mo ta ngan">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Huy</button>
                    <button type="submit" class="btn btn-primary">Them xe</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
