<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- HEAD FRAGMENT -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | La Ca Hotel'">La Ca Hotel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<!-- SIDEBAR FRAGMENT -->
<nav th:fragment="sidebar(activePage)" class="sidebar">
    <div class="sidebar-header">
        <h3><i class="bi bi-building"></i> La Ca</h3>
        <p class="sidebar-subtitle">Hotel Management</p>
    </div>
    <ul class="sidebar-nav">
        <li th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
            <a th:href="@{/}"><i class="bi bi-speedometer2"></i> <span>Tong quan</span></a>
        </li>
        <li th:classappend="${activePage == 'rooms' ? 'active' : ''}">
            <a th:href="@{/rooms}"><i class="bi bi-door-open"></i> <span>Quan ly phong</span></a>
        </li>
        <li th:classappend="${activePage == 'bookings' ? 'active' : ''}">
            <a th:href="@{/bookings}"><i class="bi bi-calendar-check"></i> <span>Dat phong</span></a>
        </li>
        <li th:classappend="${activePage == 'vehicles' ? 'active' : ''}">
            <a th:href="@{/vehicles}"><i class="bi bi-scooter"></i> <span>Cho thue xe may</span></a>
        </li>
        <li th:classappend="${activePage == 'services' ? 'active' : ''}">
            <a th:href="@{/services}"><i class="bi bi-star"></i> <span>Dich vu</span></a>
        </li>
        <li th:classappend="${activePage == 'activity-logs' ? 'active' : ''}" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/activity-logs}"><i class="bi bi-clock-history"></i> <span>Nhat ky</span></a>
        </li>
    </ul>
    <div class="sidebar-footer mt-auto p-3 border-top">
        <small class="text-muted"><i class="bi bi-person-circle"></i> <span sec:authentication="name">User</span></small>
        <form th:action="@{/logout}" method="post" class="mt-2">
            <button type="submit" class="btn btn-outline-light btn-sm w-100">
                <i class="bi bi-box-arrow-right"></i> Dang xuat
            </button>
        </form>
    </div>
</nav>

<!-- SCRIPTS FRAGMENT -->
<div th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>

</html>
