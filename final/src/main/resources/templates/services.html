<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Dich vu')}"></head>
<body>
<div class="wrapper">
    <nav th:replace="~{fragments :: sidebar('services')}"></nav>

    <div class="main-content">
        <div class="content-header">
            <h4><i class="bi bi-star"></i> Quan ly dich vu</h4>
        </div>

        <!-- Flash messages -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="row">
            <!-- Service List -->
            <div class="col-lg-8">
                <div class="card-custom mb-4">
                    <div class="card-header">
                        <i class="bi bi-list-ul"></i> Danh sách dịch vụ
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-custom table-hover">
                                <thead>
                                <tr>
                                    <th>Dịch vụ</th>
                                    <th>Danh mục</th>
                                    <th>Giá (VND)</th>
                                    <th>Mô tả</th>
                                    <th>Trạng thái</th>
                                    <th></th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="svc : ${services}">
                                    <td><strong th:text="${svc.name}">Service</strong></td>
                                    <td><span class="badge bg-info" th:text="${svc.category}">Category</span></td>
                                    <td th:text="${svc.price == 0 ? 'Mien phi' : #numbers.formatDecimal(svc.price, 0, 'COMMA', 0, 'POINT')}">0</td>
                                    <td><small th:text="${svc.description}">Desc</small></td>
                                    <td>
                                        <span class="badge" th:classappend="${svc.available ? 'bg-success' : 'bg-secondary'}"
                                              th:text="${svc.available ? 'Hoat dong' : 'Tam ngung'}">Status</span>
                                    </td>
                                    <td>
                                        <form th:action="@{/services/toggle/{id}(id=${svc.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm"
                                                    th:classappend="${svc.available ? 'btn-outline-warning' : 'btn-outline-success'}"
                                                    th:text="${svc.available ? 'Tam ngung' : 'Kich hoat'}">Toggle</button>
                                        </form>
                                        <form th:action="@{/services/delete/{id}(id=${svc.id})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"
                                                    onclick="return confirm('Xac nhan xoa dich vu nay?')">
                                                <i class="bi bi-trash"></i>
                                            </button>
                                        </form>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Add Service Form -->
            <div class="col-lg-4">
                <div class="card-custom mb-4">
                    <div class="card-header">
                        <i class="bi bi-plus-circle"></i> Them dich vu moi
                    </div>
                    <div class="card-body">
                        <form th:action="@{/services/save}" method="post" th:object="${newService}">
                            <div class="mb-3">
                                <label class="form-label">Ten dich vu *</label>
                                <input type="text" class="form-control" th:field="*{name}" required
                                       placeholder="VD: Spa & Massage">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Gia (VND) *</label>
                                <input type="number" class="form-control" th:field="*{price}" required min="0"
                                       placeholder="0">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Danh muc</label>
                                <select class="form-select" th:field="*{category}">
                                    <option value="F&B">F&B (An uong)</option>
                                    <option value="LAUNDRY">Giat ui</option>
                                    <option value="SPA">Spa</option>
                                    <option value="TRANSPORT">Van chuyen</option>
                                    <option value="FITNESS">The thao</option>
                                    <option value="OTHER">Khac</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Mo ta</label>
                                <textarea class="form-control" th:field="*{description}" rows="2"
                                          placeholder="Mo ta ngan ve dich vu"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-plus"></i> Them dich vu
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
